# Discord Bot + FastAPI Render Configuration
#
# This file configures the combined FastAPI + Discord bot deployment on Render.
# Both run in the same uvicorn process: FastAPI serves REST endpoints for the
# Vercel frontend, and the Discord bot runs as an async background task.
#
# DEPLOYMENT:
# 1. Push code to GitHub (main branch, auto-deploy is on)
# 2. Render detects changes and rebuilds automatically
# 3. Or manually: Render dashboard > Manual Deploy > Deploy latest commit
#
# ENVIRONMENT VARIABLES REQUIRED (add in Render dashboard):
# - DISCORD_TOKEN       - Discord bot token (from Developer Portal)
# - SUPABASE_URL        - Supabase project URL (https://xxx.supabase.co)
# - SUPABASE_KEY        - Supabase anon key
# - SUPABASE_DB_HOST    - Direct DB host (db.xxx.supabase.co, note: db. prefix)
# - SUPABASE_DB_PASSWORD - Actual Postgres password (NOT a JWT/service_role key)
# - SUPABASE_DB_NAME    - postgres
# - SUPABASE_DB_PORT    - 5432
# - SUPABASE_DB_USER    - postgres
# - PROD_GUILD_ID       - Discord server ID for slash command sync
# - CORS_ORIGINS        - Comma-separated allowed origins (e.g. your Vercel URL)
#
# KEEPING ALIVE (Free Tier):
# Render free tier spins down after 15 min of no HTTP traffic.
# Use uptimerobot.com to ping https://blue-deer-trading.onrender.com/health
# every 5 minutes.

services:
  - type: web
    name: blue-deer-trading-bot
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && pip install -r backend/app/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENVIRONMENT
        value: production
      - key: FASTAPI_TEST
        value: "false"
    # Secrets: add these in Render dashboard (not in this file):
    # DISCORD_TOKEN, SUPABASE_URL, SUPABASE_KEY,
    # SUPABASE_DB_HOST, SUPABASE_DB_PASSWORD, SUPABASE_DB_NAME,
    # SUPABASE_DB_PORT, SUPABASE_DB_USER, PROD_GUILD_ID, CORS_ORIGINS

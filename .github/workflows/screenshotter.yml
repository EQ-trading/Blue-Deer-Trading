name: Daily Screenshotter

on:
  schedule:
    # Run at 5 PM EST / 10 PM UTC daily
    - cron: '0 22 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Firefox
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 'latest'
      
      - name: Setup Geckodriver
        uses: browser-actions/setup-geckodriver@latest
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb  # Virtual display for headless mode
          pip install selenium requests pyvirtualdisplay
      
      - name: Run screenshotter
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          DISCORD_WEBHOOK_DAY_TRADER: ${{ secrets.DISCORD_WEBHOOK_DAY_TRADER }}
          DISCORD_WEBHOOK_SWING_TRADER: ${{ secrets.DISCORD_WEBHOOK_SWING_TRADER }}
          DISCORD_WEBHOOK_LONG_TERM_TRADER: ${{ secrets.DISCORD_WEBHOOK_LONG_TERM_TRADER }}
          DISCORD_WEBHOOK_FULL_PORTFOLIO: ${{ secrets.DISCORD_WEBHOOK_FULL_PORTFOLIO }}
          DEBUG_WEBHOOK_DAY_TRADER: ${{ secrets.DEBUG_WEBHOOK_DAY_TRADER }}
          DEBUG_WEBHOOK_SWING_TRADER: ${{ secrets.DEBUG_WEBHOOK_SWING_TRADER }}
          DEBUG_WEBHOOK_LONG_TERM_TRADER: ${{ secrets.DEBUG_WEBHOOK_LONG_TERM_TRADER }}
          DEBUG_WEBHOOK_FULL_PORTFOLIO: ${{ secrets.DEBUG_WEBHOOK_FULL_PORTFOLIO }}
        run: |
          cd screenshotter
          python screenshotter.py
      
      - name: Upload screenshots as artifacts (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshotter/screenshots/
          retention-days: 7
